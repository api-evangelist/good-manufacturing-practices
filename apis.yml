name: Good Manufacturing Practices
description: A system of processes, procedures, and documentation that ensures products
  are consistently produced and controlled according to quality standards, commonly
  used in pharmaceutical, food, and medical device manufacturing. Proper implementation
  reduces legal and operational risk while supporting audit readiness.
